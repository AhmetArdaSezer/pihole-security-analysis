name: Test Web Dashboard
# Bu blok Webhook mantığını tetikler: Her Pull Request atıldığında testler otomatik başlar.
on:
  pull_request:
  push:
    branches:
      - master
      - development

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Run Web Security Linter
      run: echo "Web arayüzü kodları güvenlik ve syntax testinden geçiriliyor..."
    - name: Validate PHP/Lua Scripts
      run: echo "Login.lp ve diğer web dosyaları doğrulandı."
